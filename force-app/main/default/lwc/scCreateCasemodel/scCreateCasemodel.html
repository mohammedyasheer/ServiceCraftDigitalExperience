<template>
    <lightning-modal-header label="Create Case"></lightning-modal-header>
        <template lwc:if={showSpinner}>
            <lightning-spinner variant="brand" size="large"></lightning-spinner>
        </template>
    <lightning-modal-body>
        <template lwc:if={recordTypeId}>
            <lightning-layout multiple-rows="true">
                <lightning-layout-item size="12" padding="around-small">
                    <lightning-record-edit-form object-api-name={objApiName} record-type-id={recordTypeId} onload={handelLoad} onsubmit={handleSubmit}>
                        <lightning-layout multiple-rows="true">
                            <lightning-layout-item size="12" padding="around-small">
                                <lightning-input-field field-name="Subject"></lightning-input-field>
                            </lightning-layout-item>
                            <lightning-layout-item size="6" padding="around-small">    
                                <lightning-input-field padding="around-small" field-name="Region__c"></lightning-input-field>
                            </lightning-layout-item>
                            <lightning-layout-item size="6" padding="around-small">
                                <lightning-input-field padding="around-small" field-name="Language__c"></lightning-input-field>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" padding="around-small">
                                <lightning-input-field field-name="Priority"></lightning-input-field>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" padding="around-small">
                                <lightning-input-field field-name="Description"></lightning-input-field>
                            </lightning-layout-item>
                            <lightning-layout-item size="12" padding="around-small">
                            <lightning-button variant="brand" label="Submit" type="submit"></lightning-button>
                            </lightning-layout-item>
                        </lightning-layout>
                    </lightning-record-edit-form>
                </lightning-layout-item>
            </lightning-layout>
        </template>
    </lightning-modal-body>
</template>
